<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        nav ul li {
            list-style: none;
            display: inline;
        }
        nav a{
            display: none;
            padding: 5px;
            color: black;
            text-decoration: none;
        }
        .container{
            background-color: blueviolet;
            border: 2px dashed #1f1717;
            width: 400px;
            height: 300px;
            padding: 10px;
            position: relative;
        }
        .box{
            background-color: bisque;
            width: 100px;
            height: 50px;
            color: blue;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px #007200 solid;
        }
        .box-1{
            background-color: blue;
        }
        .box-3{
            background-color: aqua;
        }
        .box-2{
            position: absolute;
            top: 0;
            right: 0;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
